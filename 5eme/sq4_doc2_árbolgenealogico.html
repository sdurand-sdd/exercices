<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défi Langues - Score Automatique</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #e8f4f8; margin: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        
        .progress-container { width: 80%; background: #ddd; height: 15px; border-radius: 10px; margin: 10px auto 20px; overflow: hidden; border: 2px solid #2c3e50; }
        #progress-bar { width: 0%; height: 100%; background: #3498db; transition: width 0.3s; }

        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 5px; }
        
        table { border-collapse: collapse; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        /* Cache le tableau s'il est vide */
        table:empty { display: none; }

        th, td { border: 1px solid #dee2e6; padding: 12px; }
        th { background-color: #ff9f43; color: white; font-size: 0.9rem; text-transform: uppercase; }
        
        td:first-child { min-width: 200px; max-width: 350px; background-color: #fff9f1; font-weight: bold; color: #576574; }

        input { 
            border: 3px solid #ced6e0; padding: 8px; border-radius: 8px; width: 260px; 
            font-size: 1.1rem; font-weight: bold; outline: none; transition: 0.2s;
        }
        input:focus { border-color: #ff9f43; background-color: #fff; }

        .correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .incorrect { background-color: #ff7675 !important; color: white !important; border-color: #d63031 !important; }

        .controls { text-align: center; margin-top: 5px; padding-bottom: 30px; }
        #resultat { font-size: 2rem; font-weight: bold; margin-bottom: 10px; min-height: 2.5rem; }
        
        button { 
            padding: 15px 45px; font-size: 1.3rem; cursor: pointer; 
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            color: white; border: none; border-radius: 50px;
            box-shadow: 0 5px 0 #1e8449; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #1e8449; }
    </style>
</head>
<body>

    <h1>🌟 ¡El Gran Desafío! 🌟</h1>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="container">
        <table id="table-left"><thead><tr><th>Pregunta</th><th>Respuesta</th></tr><tbody id="tbody-left"></tbody></thead></table>
        <table id="table-right"><thead><tr><th>Pregunta</th><th>Respuesta</th></tr><tbody id="tbody-right"></tbody></thead></table>
    </div>

    <div class="controls">
        <div id="resultat"></div>
        <button onclick="verifier()">¡VERIFICAR!</button>
    </div>

    <script>
        // MODIFIEZ UNIQUEMENT CETTE LISTE :
        const exercices = [
            { q: "¿quiénes son los tíos de Amadeo?", r: "son Ricardo y Rodrigo | Son Rodrigo y Ricardo" },
            { q: "¿Cuántos primos tiene?", r: "Tiene cuatro primos" },
            { q: "Quién es el marido de Adelina?", r: "Es Rodrigo" },
            { q: "Es le tío de Rodrigo y el padre de Sara", r: "Es Ricardo" },
            { q: "Es la prima de Pitu y la sobrina de Adelina", r: "Es Marcela | Es Sara" },
            { q: "Es la tía de Amadeo y la madre de Marcela", r: "Es Margarita" }
        ];

        const audioWin = new Audio('https://actions.google.com/sounds/v1/foley/success_chime.ogg');
        const audioPerfect = new Audio('https://actions.google.com/sounds/v1/human_voices/applause.ogg');

        function genererTableaux() {
            const tLeft = document.getElementById('tbody-left');
            const tRight = document.getElementById('tbody-right');
            const tableRight = document.getElementById('table-right');

            const milieu = Math.ceil(exercices.length / 2);

            exercices.forEach((ex, index) => {
                const row = `<tr>
                    <td>${ex.q}</td>
                    <td><input type="text" id="input-${index}" oninput="updateProgress()" onkeydown="if(event.key==='Enter') passerSuivant(${index})"></td>
                </tr>`;
                
                if (index < milieu) {
                    tLeft.innerHTML += row;
                } else {
                    tRight.innerHTML += row;
                }
            });

            // Si une seule colonne suffit, on cache la table de droite
            if (exercices.length <= 1) {
                tableRight.style.display = "none";
            }
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('input');
            let remplis = 0;
            inputs.forEach(i => { if(i.value.trim() !== "") remplis++; });
            document.getElementById('progress-bar').style.width = (remplis / exercices.length * 100) + "%";
        }

        function passerSuivant(index) {
            const suivant = document.getElementById(`input-${index + 1}`);
            if (suivant) suivant.focus();
        }

        function verifier() {
            let score = 0;
            
            // NETTOYAGE STRICT : On garde les accents (pas de .normalize)
            const netoyer = (t) => t.trim().toLowerCase().replace(/\s+/g, ' ').replace(/\.$/, '');

            exercices.forEach((ex, index) => {
                const input = document.getElementById(`input-${index}`);
                const reponseEleve = netoyer(input.value);
            // On sépare les réponses possibles par le signe "|"
                const reponsesPossibles = ex.r.split('|').map(res => netoyer(res));

            // On vérifie si la réponse de l'élève est dans la liste des possibles
                if (reponsesPossibles.includes(reponseEleve)) {
                input.className = "correct";
                score++;
                } else {
                input.className = "incorrect";
                }
            });

            const zone = document.getElementById('resultat');
            zone.innerHTML = `🏆 Score : ${score} / ${exercices.length}`;

            if (score === exercices.length) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                audioPerfect.play();
                zone.style.color = "#27ae60";
            } else {
                audioWin.play();
                zone.style.color = "#d35400";
            }
        }

        window.onload = genererTableaux;
    </script>
</body>
</html>
