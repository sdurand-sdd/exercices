<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQ4 - Act.2 - Obligations (3ème)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e8f4f8; margin: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .progress-container { width: 80%; background: #ddd; height: 15px; border-radius: 10px; margin: 10px auto 20px; overflow: hidden; border: 2px solid #2c3e50; }
        #progress-bar { width: 0%; height: 100%; background: #3498db; transition: width 0.3s; }

        /* Conteneur pour centrer le grand tableau */
        .container { display: flex; justify-content: center; margin-bottom: 20px; }
        
        table { 
            width: 95%; 
            max-width: 1100px; 
            border-collapse: collapse; 
            background: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            border-radius: 12px; 
            overflow: hidden; 
        }

        th, td { border: 1px solid #dee2e6; padding: 15px; }
        th { background-color: #ff9f43; color: white; font-size: 1rem; text-transform: uppercase; }
        
        /* Colonne de gauche (Consigne) */
        td:first-child { width: 40%; background-color: #fff9f1; font-weight: bold; color: #576574; }
        /* Colonne de droite (Saisie) */
        td:last-child { width: 60%; }

        input { 
            border: 3px solid #ced6e0; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 1.1rem; 
            font-weight: bold; 
            outline: none; 
            transition: 0.2s;
            box-sizing: border-box; /* Empêche l'input de déborder */
        }
        input:focus { border-color: #ff9f43; background-color: #fff; transform: scale(1.01); }

        .correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .incorrect { background-color: #ff7675 !important; color: white !important; border-color: #d63031 !important; }

        .controls { text-align: center; margin-top: 10px; padding-bottom: 40px; }
        #resultat { font-size: 2rem; font-weight: bold; margin-bottom: 10px; min-height: 2.5rem; }
        
        button { 
            padding: 15px 50px; font-size: 1.4rem; cursor: pointer; 
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            color: white; border: none; border-radius: 50px;
            box-shadow: 0 5px 0 #1e8449; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #1e8449; }
    </style>
</head>
<body>

    <h1>🌟 ¡El Gran Desafío de las Obligaciones! 🌟</h1>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Frase original</th>
                    <th>Transformación (Obligación)</th>
                </tr>
            </thead>
            <tbody id="tbody-unique"></tbody>
        </table>
    </div>

    <div class="controls">
        <div id="resultat"></div>
        <button onclick="verifier()">¡VERIFICAR!</button>
    </div>

    <script>
        // LISTE DES EXERCICES (Adaptée pour 3ème)
        const exercices = [
            { q: "Plantáis árboles → obligation impersonnelle", r: "hay que plantar árboles | es necesario plantar árboles | hace falta plantar árboles" },
            { q: "Explican las normas ecológicas → obligations personnelles", r: "tienen que explicar las normas ecológicas | deben explicar las normas ecológicas | es necesario que expliquen las normas ecológicas" },
            { q: "Ahorramos agua → obligation personnelle (nosotros)", r: "tenemos que ahorrar agua | debemos ahorrar agua | es necesario que ahorremos agua" },
            { q: "Protege el medio ambiente → obligation impersonnelle", r: "hay que proteger el medio ambiente | es necesario proteger el medio ambiente" },
            { q: "Reciclo el plástico → obligation personnelle (yo)", r: "tengo que reciclar el plástico | debo reciclar el plástico | es necesario que recicle el plástico" },
            { q: "Consumís menos energía → obligation personnelle (vosotros)", r: "tenéis que consumir menos energía | debéis consumir menos energía | es necesario que consumáis menos energía" }
        ];

        const audioWin = new Audio('https://actions.google.com/sounds/v1/foley/success_chime.ogg');
        const audioPerfect = new Audio('https://actions.google.com/sounds/v1/human_voices/applause.ogg');

        function genererTableaux() {
            const tbody = document.getElementById('tbody-unique');
            exercices.forEach((ex, index) => {
                const row = `<tr>
                    <td>${ex.q}</td>
                    <td>
                        <input type="text" 
                               id="input-${index}" 
                               placeholder="Escribe la frase completa..."
                               autocomplete="off"
                               oninput="updateProgress()" 
                               onkeydown="if(event.key==='Enter') passerSuivant(${index})">
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('input');
            let remplis = 0;
            inputs.forEach(i => { if(i.value.trim() !== "") remplis++; });
            document.getElementById('progress-bar').style.width = (remplis / exercices.length * 100) + "%";
        }

        function passerSuivant(index) {
            const suivant = document.getElementById(`input-${index + 1}`);
            if (suivant) suivant.focus();
        }

        function verifier() {
            let score = 0;
            const netoyer = (t) => t.trim().toLowerCase().replace(/\s+/g, ' ').replace(/\.$/, '');

            exercices.forEach((ex, index) => {
                const input = document.getElementById(`input-${index}`);
                const reponseEleve = netoyer(input.value);
                const reponsesPossibles = ex.r.split('|').map(res => netoyer(res));

                if (reponsesPossibles.includes(reponseEleve)) {
                    input.className = "correct";
                    score++;
                } else {
                    input.className = "incorrect";
                }
            });

            const zone = document.getElementById('resultat');
            zone.innerHTML = `🏆 Score : ${score} / ${exercices.length}`;

            if (score === exercices.length) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                audioPerfect.play();
                zone.style.color = "#27ae60";
            } else {
                audioWin.play();
                zone.style.color = "#d35400";
            }
        }

        window.onload = genererTableaux;
    </script>
</body>
</html>
