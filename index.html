<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Pédagogique - Mes Exercices</title>
    <style>
        :root { --primary: #3498db; --bg: #f8f9fa; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 30px; }
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .section-container { margin-bottom: 50px; }
        .folder-title { font-size: 1.8rem; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; }
        .folder-title::before { content: "📁"; margin-right: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; text-decoration: none; color: inherit; display: block; transition: all 0.3s ease; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(52, 152, 219, 0.2); }
        .card h3 { margin: 0; color: var(--text); font-size: 1.1rem; line-height: 1.4; }
        .card::after { content: "Lancer l'exercice →"; display: block; margin-top: 15px; font-size: 0.8rem; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚀 Mon Portail d'Exercices</h1>
    <div id="main-container">
        <p style="text-align:center;">Analyse du dépôt en cours...</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const USER = "sdurand-sdd"; // <--- REMPLACEZ PAR VOTRE PSEUDO
        const REPO = "exercices"; 
        // ---------------------

        async function fetchContent(path = "") {
            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${path}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("Erreur API");
            return await response.json();
        }

        async function init() {
            const main = document.getElementById('main-container');
            try {
                const rootContent = await fetchContent();
                main.innerHTML = ""; 

                for (const item of rootContent) {
                    if (item.type === "dir") {
                        // Création de la section pour le dossier
                        const section = document.createElement('div');
                        section.className = 'section-container';
                        const displayFolderName = item.name.replace(/_/g, ' ').replace(/-/g, ' ').toUpperCase();
                        section.innerHTML = `<h2 class="folder-title">${displayFolderName}</h2><div id="grid-${item.name.replace(/[^a-z0-9]/gi, '')}" class="grid"></div>`;
                        main.appendChild(section);

                        // Récupération des fichiers dans ce dossier
                        const files = await fetchContent(item.path);
                        const grid = document.getElementById(`grid-${item.name.replace(/[^a-z0-9]/gi, '')}`);
                        
                        for (const file of files) {
                            if (file.name.endsWith('.html')) {
                                const card = document.createElement('a');
                                card.className = 'card';
                                card.href = `https://${USER}.github.io/${REPO}/${item.name}/${file.name}`;
                                card.setAttribute('target', '_blank');
                                
                                // ID unique pour mettre à jour le titre plus tard
                                const titleId = `title-${Math.random().toString(36).substr(2, 9)}`;
                                
                                // Titre par défaut (nom du fichier nettoyé)
                                let tempTitle = file.name.replace('.html', '').replace(/_/g, ' ').replace(/-/g, ' ');
                                card.innerHTML = `<h3 id="${titleId}">${tempTitle}</h3>`;
                                grid.appendChild(card);

                                // Tentative de lecture du titre réel dans le HTML
                                fetch(card.href)
                                    .then(res => res.text())
                                    .then(htmlText => {
                                        const parser = new DOMParser();
                                        const doc = parser.parseFromString(htmlText, 'text/html');
                                        const realTitle = doc.querySelector('title') ? doc.querySelector('title').innerText : "";
                                        if (realTitle && realTitle.trim() !== "") {
                                            document.getElementById(titleId).innerText = realTitle;
                                        }
                                    })
                                    .catch(err => console.log("Erreur lecture titre : " + file.name));
                            }
                        }
                    }
                }
            } catch (error) {
                main.innerHTML = "<p style='text-align:center; color:red;'>Erreur de chargement. Vérifiez votre pseudo et le nom du dépôt.</p>";
                console.error(error);
            }
        }

        init();
    </script>
</body>
</html>
