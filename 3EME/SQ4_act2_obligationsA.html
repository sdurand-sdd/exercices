<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQ4 - Act.2 - Obligations (3ème)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* DESIGN TAUPE CHAUD - SPÉCIAL 3ÈME */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #d2b48c; /* Taupe clair / Tan */
            margin: 20px; 
            color: #4a3f35;
        }
        
        h1 { text-align: center; color: #4a3f35; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); }
        
        /* ZONE DE CONSIGNE PEDAGOGIQUE */
       /* ZONE DE CONSIGNE PEDAGOGIQUE AMÉLIORÉE (Flexbox) */
        .header-container {
            max-width: 1050px;
            margin: 0 auto 30px auto;
            display: flex; /* Active le mode Flexbox */
            align-items: center; /* Centre verticalement les éléments l'un par rapport à l'autre */
            justify-content: space-between; /* Espace équilibré */
            background-color: #eaddcf; /* Taupe très doux */
            border-left: 6px solid #6f5f51; /* Taupe foncé */
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            overflow: hidden; /* Pour que l'image ne dépasse pas */

            /* Style pour l'image dans ce conteneur */
        .header-container img {
            max-height: 120px; /* Limite la hauteur */
            width: auto;
            margin-left: 20px; /* Espace à gauche */
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            flex-shrink: 0; /* Empêche l'image de se compresser */

            /* Style pour le texte dans ce conteneur */
        .consigne-box {
            padding: 20px 30px; /* Plus d'espace sur les côtés */
            color: #4a3f35;
            font-size: 1.1rem;
            line-height: 1.6;
            flex-grow: 1; /* Le texte prend tout l'espace restant */
        }
        .consigne-box strong { color: #6f5f51; text-transform: uppercase; margin-right: 10px; }
            
        .progress-container { width: 80%; background: #ede0d4; height: 15px; border-radius: 10px; margin: 10px auto 25px; overflow: hidden; border: 2px solid #4a3f35; }
        #progress-bar { width: 0%; height: 100%; background: #8b7355; transition: width 0.3s; }

        .container { display: flex; justify-content: center; margin-bottom: 20px; }
        
        table { 
            width: 95%; 
            max-width: 1100px; 
            border-collapse: collapse; 
            background: #fdfaf7; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            border-radius: 12px; 
            overflow: hidden; 
        }

        th, td { border: 1px solid #c5b4a2; padding: 15px; }
        
        /* EN-TÊTES TAUPE FONCÉ */
        th { background-color: #6f5f51; color: #fdfaf7; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        
        td:first-child { width: 40%; background-color: #eaddcf; font-weight: bold; color: #4a3f35; }
        td:last-child { width: 60%; }

        input { 
            border: 2px solid #c5b4a2; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 1.1rem; 
            background-color: #fdfaf7;
            color: #4a3f35;
            outline: none; 
            transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: #6f5f51; background-color: #fff; box-shadow: 0 0 8px rgba(111, 95, 81, 0.3); transform: scale(1.01); }

        /* COULEURS DE CORRECTION HARMONISÉES */
        .correct { background-color: #7a9461 !important; color: white !important; border-color: #5d7049 !important; }
        .incorrect { background-color: #bc6c25 !important; color: white !important; border-color: #9b581e !important; }

        .controls { text-align: center; margin-top: 10px; padding-bottom: 50px; }
        #resultat { font-size: 2rem; font-weight: bold; margin-bottom: 15px; min-height: 2.5rem; color: #4a3f35; }
        
        /* BOUTON ¡COMPROBAR! */
        button { 
            padding: 18px 60px; font-size: 1.5rem; cursor: pointer; 
            background: #6f5f51;
            color: #fdfaf7; border: none; border-radius: 50px;
            box-shadow: 0 5px 0 #4a3f35; transition: 0.1s;
            font-weight: bold;
        }
        button:hover { background: #827162; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #4a3f35; }
    </style>
</head>
<body>

    <h1>🌟 ¡El Gran Desafío de las Obligaciones! 🌟</h1>

    <div class="header-container">
        <div class="consigne-box">
            <strong>Consigna:</strong> 
            Transforma las frases utilizando las estructuras de obligación (personales o impersonales) indicadas entre paréntesis. 
            Presta atención a la conjugación y a las tildes.
        </div>

        <img src="URL_DE_VOTRE_BITMOJI.png" alt="Profe">
    </div>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Frase original</th>
                    <th>Tu transformación</th>
                </tr>
            </thead>
            <tbody id="tbody-unique"></tbody>
        </table>
    </div>

    <div class="controls">
        <div id="resultat"></div>
        <button onclick="verifier()">¡COMPROBAR!</button>
    </div>

    <script>
        // LISTE DES EXERCICES
        const exercices = [
            { 
                q: "Plantáis árboles → obligación impersonnelle", 
                r: "hay que plantar árboles | es necesario plantar árboles | hace falta plantar árboles" 
            },
            { 
                q: "Explican las normas ecológicas → obligations personnelles", 
                r: "tienen que explicar las normas ecológicas | deben explicar las normas ecológicas | es necesario que expliquen las normas ecológicas" 
            }
            // Vous pouvez ajouter vos 10 autres phrases ici en suivant le même modèle !
        ];

        const audioWin = new Audio('https://actions.google.com/sounds/v1/foley/success_chime.ogg');
        const audioPerfect = new Audio('https://actions.google.com/sounds/v1/human_voices/applause.ogg');

        function genererTableaux() {
            const tbody = document.getElementById('tbody-unique');
            exercices.forEach((ex, index) => {
                const row = `<tr>
                    <td>${ex.q}</td>
                    <td>
                        <input type="text" id="input-${index}" placeholder="Escribe aquí..." autocomplete="off" oninput="updateProgress()" onkeydown="if(event.key==='Enter') passerSuivant(${index})">
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('input');
            let remplis = 0;
            inputs.forEach(i => { if(i.value.trim() !== "") remplis++; });
            document.getElementById('progress-bar').style.width = (remplis / exercices.length * 100) + "%";
        }

        function passerSuivant(index) {
            const suivant = document.getElementById(`input-${index + 1}`);
            if (suivant) suivant.focus();
        }

        function verifier() {
            let score = 0;
            const netoyer = (t) => t.trim().toLowerCase().replace(/\s+/g, ' ').replace(/\.$/, '');

            exercices.forEach((ex, index) => {
                const input = document.getElementById(`input-${index}`);
                const reponseEleve = netoyer(input.value);
                const reponsesPossibles = ex.r.split('|').map(res => netoyer(res));

                if (reponsesPossibles.includes(reponseEleve)) {
                    input.className = "correct";
                    score++;
                } else {
                    input.className = "incorrect";
                }
            });

            const zone = document.getElementById('resultat');
            zone.innerHTML = `🏆 Score : ${score} / ${exercices.length}`;

            if (score === exercices.length) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                audioPerfect.play();
                zone.style.color = "#7a9461";
            } else {
                audioWin.play();
                zone.style.color = "#bc6c25";
            }
        }

        window.onload = genererTableaux;
    </script>
</body>
</html>
